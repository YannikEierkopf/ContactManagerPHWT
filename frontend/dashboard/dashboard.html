<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../layout.css">
    <link rel="stylesheet" href="dashboard.css">
    <script src="dashboard.js" defer></script>
    <script src="logout.js" defer></script>
    <script src="search.js" defer></script>
</head>

<body>

    <header>
        <h1><a href="/dashboard/dashboard.html">Kontaktverwaltung</a></h1>
        <button type="button"> Abmelden</button>
    </header>

    <main>
        <section id="user">
            <h2>Benutzer Bereich</h2>
            <fieldset>
                <legend> Kontakte verwalten</legend>
                <div id="userNavigation">
                    <button type="button" class="btn-new-contact">Neuen Kontakt anlegen</button>
                
                    <label for="contactSearch">Kontakt suchen (nach Benutzername)</label>
                    <input type="text" id="contactSearch" name="contactSearch" maxlength="255" placeholder="Nach Kontakt suchen">
                </div>

                <div id="allContacts">
                    <h3>Alle Kontakte</h3>
                    <ul id="contactList">
                        <!--Kontakte werden per Javascript aus der Dashboard.js angezeigt-->
                    </ul>
                </div>
            </fieldset>
        </section>

        <section id="admin">
            <h2>Administrator Bereich</h2>
            <div id="adminSite">
                <form id="createUserForm">
                    <fieldset>
                    <legend> Neuen Benutzer oder Administrator anlegen</legend>

                        <label for="username">Benutzername</label>
                        <input type="text" id="username" name="username" maxlength="255" placeholder="Gebe den Benutzernamen an" required>

                        <label for="password">Passwort</label>
                        <input type="password" id="password" name="password" maxlength="255" placeholder="Gebe das Passwort an" required>

                        <label for="role">Rolle</label>
                        <select id="role" name="role">
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                        <button type="reset">Zurücksetzen</button>
                        <button type="submit">Benutzer erstellen</button>
                    </fieldset>
            </form>
            </div>
        </section>

    </main>

    <footer>
        <nav>
            <a href="../footer/impressum.html">Impressum</a>
            <a href="../footer/kontakt.html">Kontakt</a>
            <a href="../footer/datenschutz.html">Datenschutz</a>
        </nav>
    </footer>

</body>
</html>
