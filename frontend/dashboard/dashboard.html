<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../layout.css">
    <link rel="stylesheet" href="dashboard.css">
    <script src="dashboard.js" defer></script> <!--defer, Ausführung erst wenn HTML geparst wurde -->
    <script src="logout.js" defer></script>
    <!-- <script src="filter.js" defer></script> -->
    <script src="search.js" defer></script>
</head>
<body>
    <header>
        <h1>Kontakt-Verwaltung</h1>
        <button type="button"> Abmelden</button>
    </header>


    <main>

        <section id="user">
            <fieldset>
            <legend> Benutzer Bereich</legend>
            <div id="userNavigation">
                <a href="../contact/new_contact.html">Neuen Kontakt anlegen</a>
                
                <label for="contactSearch">Kontakt suchen (nach Benutzername)</label>
                <input type="text" id="contactSearch" name="contactSearch" maxlength="255" placeholder="Nach Kontakt suchen">
            </div>

            <div id="allContacts">
                <h3>Alle Kontakte</h3>
                <ul id="contactList">
                    <!--Kontakte werden per Javascript angezeigt-->
                </ul>
            </div>
            </fieldset>
        </section>

        <section id="admin">
            <h2>Admin Bereich</h2>
            <div id="adminSite">

            <form id="createUserForm">
                <fieldset>
                    <legend> Neuen Benutzer anlegen</legend>

                    <label for="username">Benutzername</label>
                    <input type="text" id="username" name="username" maxlength="255" placeholder="Gebe den Benutzernamen an" required>

                    <label for="password">Passwort</label>
                    <input type="password" id="password" name="password" maxlength="255" placeholder="Gebe das Passwort an" required>

                    <label for="role">Rolle</label>
                    <select id="role" name="role">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                    <button type="reset">Zurücksetzen</button>
                    <button type="submit">Benutzer erstellen</button>
                </fieldset>
            </form>
            </div>
        </section>


    </main>


    <footer>
        <nav>
            <a href="../footer/impressum.html">Impressum</a>
            <a href="../footer/kontakt.html">Kontakt</a>
            <a href="../footer/datenschutz.html">Datenschutz</a>
        </nav>
    </footer>

<!--Codebase englisch, Für Anwender sichtbarkeit auf deutsch Symbole, nur UTF-8, kein chinesichen Symbole, Max eingabe zeichen, keine Skripte-->
</body>
</html>
