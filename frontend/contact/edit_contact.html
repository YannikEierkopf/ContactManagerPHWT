<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit contact</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>Kontakt bearbeiten</h1>
</header>

<main>
    <form action="/edit/contact" method="POST">

        <input type="hidden" name="id" id="contactId">

        <fieldset>
            <legend>Standard Informationen</legend>

            <div class="field">
                <label for="firstName">Vorname</label><br>
                <input type="text" name="firstName" id="firstName" placeholder="Gebe den Vorname ein">
            </div>

            <div class="field">
                <label for="lastName">Nachname</label><br>
                <input type="text" name="lastName" id="lastName" placeholder="Gebe den Nachname ein">
            </div>

            <div class="field">
                <label for="email">Email</label><br>
                <input type="email" name="email" id="email" placeholder="Gebe die Email ein">
            </div>

            <div class="field">
                <label for="telephoneNumber">Telefonnummer</label><br>
                <input type="tel" name="telephoneNumber" id="telephoneNumber" placeholder="Gebe den Telefonnummer ein">
            </div>
        </fieldset>

        <fieldset>
            <legend>Eigene Informationen</legend>

            <div id = "customFields"></div>

            <button type="button" onclick="addField()">Neues Feld erstellen</button>

            <script>
                window.onload = async () => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const contactId = urlParams.get('id');

                    if (!contactId) {
                        return;
                    }

                    document.getElementById('contactId').value = contactId;

                    try {
                        const response = await fetch(`/api/contacts/${contactId}`);
                        const contact = await response.json();

                        document.getElementById('firstName').value = contact.first_name || '';
                        document.getElementById('lastName').value = contact.last_name || '';
                        document.getElementById('email').value = contact.email || '';
                        document.getElementById('telephoneNumber').value = contact.telephone_number || '';

                        if (contact.custom_fields) {
                            for (const [key, value] of Object.entries(contact.custom_fields)) {
                                loadCustomField(key, value);
                            }
                        }
                    } catch (error) {
                        console.error('Error:', error);
                    }
                };

                function addField() {
                    const container = document.getElementById('customFields');
                    const field = document.createElement('div');
                    const i = Date.now();

                    field.id = `${i}`;
                    field.style.marginBottom = '10px';
                    field.innerHTML = `
                        <input type = "text" id = "label_${i}" name = "label_${i}" placeholder = "Bezeichnung"><br>
                        <input type="text" id = "input_${i}" name="input_${i}" placeholder="Wert"><br>
                        <button type = "button" onclick = "removeField(${i})">Feld löschen</button>`

                    container.appendChild(field);
                }

                function removeField(id) {
                    const field = document.getElementById(id);
                    field.remove();

                }
            </script>


        </fieldset>

        <button type="submit">Änderung speichern</button>

    </form>
</main>

</body>
</html>
