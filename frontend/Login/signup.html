<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrieren - Kontakt-Verwaltung</title>
    <link rel="stylesheet" href="/login/login.css">
    <script src="/login/signup.js" defer></script>
</head>
<body>
    <header></header>
    <main class="login-container">
        <h1>Registrieren</h1>
        <form id="loginForm">
            <section class="form-group">
                <label for="username">Benutzername</label>
                <input type="text" id="username" name="username" placeholder="Erstelle deinen Benutzernamen" required>
            </section>

            <section class="form-group">
                <label for="password">Passwort</label>
                <input type="password" id="password" name="password" placeholder="Erstelle dein Passwort" required>
                <div class="error-message" id="passwordError"></div>
            </section>

            <button type="submit" class="btn-login" onclick="window.location.href='/login/login.html'">Zurück zum Login</button>
            <button type="submit" class="btn-login">Registrieren</button>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 Kontakt-Verwaltung. Alle Rechte vorbehalten. <br>
            <a href="Impressum.html">Impressum</a>
        </p>
    </footer>
</body>
</html>
