<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Contact Manager</title>
    <link rel="stylesheet" href="login.css">
    <script src="login.js" defer></script>
</head>
<body>
    <header></header>
    <main class="login-container">
        <h1>Contact Manager</h1>
        <form id="loginForm">
            <section class="form-group">
                <label for="Benutzername">Benutzername</label>
                <input type="text" id="Benutzername" name="Benutzername" placeholder="Gib deinen Benutzernamen ein" required>
            </section>

            <section class="form-group">
                <label for="password">Passwort</label>
                <input type="password" id="password" name="password" placeholder="Gib dein Passwort ein" required>
                <div class="error-message" id="passwordError"></div>
            </section>

            <section class="remember-me">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Login merken</label>
            </section>

            <button type="submit" class="btn-login">Login</button>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 Contact Manager. Alle Rechte vorbehalten. <br>
            <a href="Impressum.html">Impressum</a>
        </p>
    </footer>
</body>
</html>
