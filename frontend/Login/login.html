<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmelden - Kontakt-Verwaltung</title>
    <link rel="stylesheet" href="/login/login.css">
    <script src="/login/login.js" defer></script>
</head>
<body>
    <header></header>
    <main class="login-container">
        <h1>Kontakt-Verwaltung</h1>
        <form id="loginForm">
            <section class="form-group">
                <label for="username">Benutzername</label>
                <input type="text" id="username" name="username" placeholder="Gib deinen Benutzernamen ein" required>
            </section>

            <section class="form-group">
                <label for="password">Passwort</label>
                <input type="password" id="password" name="password" placeholder="Gib dein Passwort ein" required>
                <div class="error-message" id="passwordError"></div>
            </section>

            <section class="remember-me">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Anmeldung merken</label>
            </section>

            <button type="submit" class="btn-login">Anmelden</button>
            <section class="signup-link">
            Du hast noch keinen Account? <a href="/login/signup.html">Registrieren</a>
            </section>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 Kontakt-Verwaltung. Alle Rechte vorbehalten. <br>
            <a href="Impressum.html">Impressum</a> •
            <a href="Datenschutz.html">Datenschutz</a> •
            <a href="Kontakt.html">Kontakt</a>
        </p>
    </footer>
</body>
</html>
