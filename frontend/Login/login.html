<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmelden - Kontakt-Verwaltung</title>
    <link rel="stylesheet" href="/layout.css">
    <link rel="stylesheet" href="/login/login.css">
    <script src="/login/login.js" defer></script>
</head>
<body>
    <header>
        <h1><a href="/dashboard/dashboard.html">Kontaktverwaltung</a></h1>
    </header>

    <main class="login-container">
        <h2>Du hast bereits ein Konto?</h2>
        <h2>Dann melde dich hier an!</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Benutzername</label>
                <input type="text" id="username" name="username" placeholder="Gib deinen Benutzernamen ein" required>
            </div>

            <div class="form-group">
                <label for="password">Passwort</label>
                <input type="password" id="password" name="password" placeholder="Gib dein Passwort ein" required>
                <div class="error-message" id="passwordError"></div>
            </div>

            <div class="remember-me">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Anmeldung merken</label>
            </div>

            <button type="submit" class="btn-login">Anmelden</button>
            <div class="signup-link">
            Du hast noch keinen Account? <a href="/login/signup/signup.html">Registrieren</a>
            </div>
        </form>
    </main>
    <footer>
        <nav>
            <a href="/footer/impressum.html">Impressum</a>
            <a href="/footer/datenschutz.html">Datenschutz</a>
            <a href="/footer/kontakt.html">Kontakt</a>
        </nav>
    </footer>
</body>
</html>
