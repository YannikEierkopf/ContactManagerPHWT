<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrieren - Kontakt-Verwaltung</title>
    <link rel="stylesheet" href="/layout.css">
    <link rel="stylesheet" href="/login/login.css">
    <script src="/login/signup/signup.js" defer></script>
    <link rel="icon" href="../assets/favicon.ico" type="image/x-icon">
</head>
<body>
    <header>
        <h1><a href="/dashboard/dashboard.html">Kontaktverwaltung</a></h1>
    </header>

    <main class="login-container">
        <h2>Registrieren</h2>
        <form id="loginForm">
            <section class="form-group">
                <label for="username">Benutzername</label>
                <input type="text" id="username" name="username" placeholder="Erstelle deinen Benutzernamen" required>
            </section>

            <section class="form-group">
                <label for="password">Passwort</label>
                <input type="password" id="password" name="password" placeholder="Erstelle dein Passwort" required>
                <div class="error-message" id="passwordError"></div>
            </section>

            <button type="submit" class="btn-login">Registrieren</button>
            <button type="button" class="btn-to-login">Zurück zum Login</button>
        </form>
    </main>
    <footer>
        <nav>
            <a href="/footer/impressum.html">Impressum</a>
            <a href="/footer/datenschutz.html">Datenschutz</a>
            <a href="/footer/kontakt.html">Kontakt</a>
        </nav>
    </footer>
</body>
</html>
